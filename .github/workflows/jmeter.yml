name: JMeter Performance Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  jmeter-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install JMeter
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 jmeter

      - name: Create directories
        run: mkdir -p results reports

      - name: Run Load Test
        run: |
          ./jmeter/bin/jmeter -n \
            -t test-plans/load_test.jmx \
            -l results/results_load.jtl \
            -e \
            -o reports/html-report-load

      - name: Run Stress Test
        run: |
          ./jmeter/bin/jmeter -n \
            -t test-plans/stress_test.jmx \
            -l results/results_stress.jtl \
            -e \
            -o reports/html-report-stress

      - name: Upload HTML Reports
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-html-report
          path: reports/

      - name: Upload JTL Results
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-jtl-results
          path: results/
